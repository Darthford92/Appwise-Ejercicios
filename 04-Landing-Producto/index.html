<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Teclado Mecánico Appwise Ninja</h1>
        <p>Escriba a la velocidad de la luz. Sin distracciones</p>
        <button type="button">Comprar Ahora - $99</button>
    </header>

    <section>
        <video src="assets/promo.mp4" width="300" height="300" preload="auto"
        controls autoplay muted loop>
        <!-- En video src (source) nos indica la ruta en la cual está guardado
         el video.
         width define el ancho del reproductor en pixeles (no cambia la 
         resolución del video mismo) si solo se elije width el alto del
         reproductor se define automáticamente.
         height define el alto del reproductor en pixeles (no cambia la 
         resolución del video mismo)si solo se elije height el ancho del
         reproductor se define automáticamente.
         preload sirve para definir cuanto del video se carga mientras se carga
         la página,ésto sirve para luego usar autoplay, que permite ejecutar el
         video apenas se carge la página sin tocar nada.
         controls permite que existan cntroles de play, pausa y avance en el video
         
        -->
            <source src="assets/promo.mp4">
            <source src="assets/promo.webm">
            <!-- source nos permite tener varias opciones de reproducción
             dentro de video y, en caso de no soportar ninguna enviar un 
             comentario al usuario-->
            Tu navegador no soporta video. Cambia o actualiza el navegador a su ultima versión.
        </video>
    </section>

</body>
</html>
