<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
</head>
<body>
    <main>
        <h1>Mis Tareas Pendientes</h1>
        <section>
            <input type="text" placeholder="¿Qué necesitas hacer hoy?">
            <button>Agregar Tareas</button>
        </section>
        <ul>
            <li>
                <label for="tarea1"><span>Estudiar etiquetas semánticas</span>
                    <input type="checkbox" id="tarea1">
                </label>
                <button>x</button>
            </li>
            <li>
                <label for="tarea2"><span>Tomar 2 litros de agua</span>
                    <input type="checkbox" checked id="tarea2">
                </label>
                <button>x</button>
            </li>
            <li>
                <label for="tarea3"><span>Avanzar en el proyecto de Github</span>
                    <input type="checkbox" id="tarea3">
                </label>
                <button>x</button>
            </li>
        </ul>
        <hr>
        <p>Tienes 2 tareas pendientes</p>
        <button> Limpiar completadas</button>
    </main>
</body>
</html>
