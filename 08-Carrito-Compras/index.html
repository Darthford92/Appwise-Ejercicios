<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Appwise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Appwise Store</h1>
        <button id="cart">🛒 Ver Carrito (2)</button>
    </header>
    <main>
        <!-- Div creado para contener el section y cambiar la direccion del flex-->
        <div class="products_container">
            <h2 >Nuestros productos</h2>
            <section>
                <article>
                    <img src="assets/auricular_gamer.webp" alt="Auriculares Inalámbricos" width="100">
                    <h3>Auriculares Inalambricos</h3>
                    <p><strong>$49.99</strong></p>
                    <button class="add_product">Añadir al carrito</button>
                </article>
                <article>
                    <img src="assets/teclado_mecanico.webp" alt="Teclado Mecánico" width="100">
                    <h3>Teclado Mecánico</h3>
                    <p><strong>$99.99</strong></p>
                    <button class="add_product">Añadir al carrito</button>
                </article>
                <article>
                    <img src="assets/mouse_gamer.webp" alt="Mouse Gamer con luces RGB" width="100">
                    <h3>Mouse Gamer RGB</h3>
                    <p><strong>$29.99</strong></p>
                    <button class="add_product">Añadir al carrito</button>
                </article>
            </section>
        </div>
        
        <aside>
            <h2>Resumen de Compra</h2>
            <hr>
            <ul>
                <li>
                    <span>Teclado Mecánico</span>
                    <div class="right">
                        <strong>$99.99</strong>
                        <button class="remove_element"> X </button>
                    </div>
                </li>

                <li>
                    <span>Auriculares Inalámbricos </span>
                    <div class="right">
                        <strong>$49.99</strong>
                        <button class="remove_element"> X </button>
                    </div>
                </li>
            </ul>
            <hr>
            <h3><strong>Total: $149.98</strong></h3>
            <button id="buy">Finalizar Compra</button>
        </aside>
    </main>
</body>
</html>
